# ===========================================
# SonarQube Configuration for CertifyPro
# ===========================================

# Project identification
sonar.projectKey=certifypro
sonar.projectName=CertifyPro - Sistema de Certificación
sonar.projectVersion=1.0.0

# Source encoding
sonar.sourceEncoding=UTF-8

# ===========================================
# Backend (Django/Python) Configuration
# ===========================================
sonar.python.version=3.10.11

# Python sources - exclude tests folder
sonar.sources=SystemCertification/
sonar.exclusions=**/migrations/**,**/venv/**,**/__pycache__/**,**/*.pyc,**/tests/**

# Python tests - new location
sonar.tests=SystemCertification/tests/
sonar.test.inclusions=**/test_*.py
sonar.test.exclusions=**/migrations/**

# Python coverage reports
sonar.python.coverage.reportPaths=SystemCertification/coverage.xml
sonar.python.coveragePlugin=cobertura

# ===========================================
# Frontend (React/JavaScript) Configuration
# ===========================================

# JavaScript/TypeScript sources
sonar.sources=frontend/src/
sonar.exclusions=**/node_modules/**,**/tests/**,**/*.test.js,**/*.test.jsx

# JavaScript tests
sonar.javascript.test.inclusions=frontend/src/tests/**/*.{js,jsx}
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ===========================================
# General Settings
# ===========================================

# File exclusions for duplication detection
sonar.cpd.exclusions=**/migrations/**,**/venv/**,**/*.min.js,**/*.min.css

# Quality Gate thresholds
sonar.qualitygate.wait=false

# SCM provider
sonar.scm.provider=git
sonar.scm.forceReloadAll=false