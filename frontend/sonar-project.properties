# ===========================================
# SonarQube Configuration for Frontend
# ===========================================

# Project identification
sonar.projectKey=certifypro-frontend
sonar.projectName=CertifyPro Frontend
sonar.projectVersion=1.0.0

# Source encoding
sonar.sourceEncoding=UTF-8

# Sources configuration
sonar.sources=src/
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.jsx,**/*.test.js,**/tests/**

# Tests configuration
sonar.tests=src/
sonar.test.inclusions=**/*.test.jsx,**/*.test.js

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# JavaScript/TypeScript specific
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx

# File exclusions
sonar.cpd.exclusions=**/styles/**,**/theme.js

# Quality profiles
sonar.qualitygate.wait=false

# SCM provider
sonar.scm.provider=git
